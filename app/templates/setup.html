<!DOCTYPE html>
<html>
<head>
    <title>DDNS Editor -- Set up a password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    {% include '_shell_style.html' %}
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--de-bg);">
    <div class="de-card" style="width: 420px; padding: 1.75rem;">
        <h1 class="h4 mb-2" style="font-weight: 600;">Secure this editor</h1>
        <p class="text-muted">Anyone who can reach this page can currently view and edit your DNS records and tokens. Set a password to require a login from now on.</p>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" name="username" value="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" autofocus>
                <div class="form-text">At least 8 characters.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm password</label>
                <input type="password" class="form-control" name="confirm">
            </div>
            <button type="submit" class="btn btn-primary w-100">Set password and log in</button>
        </form>
        <p class="text-center mt-3 text-muted small mb-0"><a href="{{ url_for('index') }}">Skip for now</a></p>
    </div>
</body>
</html>
