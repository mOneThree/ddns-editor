<style>
    :root {
        --de-bg: #f6f6f4;
        --de-surface: #ffffff;
        --de-border: #e3e3de;
        --de-border-strong: #d1d1c9;
        --de-text: #24241f;
        --de-text-secondary: #6b6b62;
        --de-text-muted: #9c9c92;
        --de-accent: #276055;
        --de-accent-bg: #e8f2ef;
        --de-accent-strong: #1c463d;
        --de-danger: #a3342b;
        --de-danger-bg: #fbebe9;
        --de-warning: #8a5d10;
        --de-warning-bg: #fbf1de;
        --de-success: #2c6e49;
        --de-success-bg: #eaf4ee;
        --de-radius: 10px;
        --de-radius-lg: 14px;
        --de-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background: var(--de-bg);
        color: var(--de-text);
        font-family: var(--de-font);
        font-size: 14.5px;
    }
    h1, h2, h3, h4, h5, h6 { color: var(--de-text); font-weight: 600; }
    h1 { font-size: 1.5rem; }
    code { color: var(--de-accent-strong); background: var(--de-accent-bg); padding: 1px 5px; border-radius: 5px; font-size: 0.85em; }
    a { color: var(--de-accent); }
    hr { border-color: var(--de-border); opacity: 1; }
    .text-muted { color: var(--de-text-muted) !important; }

    /* Buttons: flat, subtle, no default Bootstrap blue/shadow */
    .btn { border-radius: var(--de-radius); font-size: 0.85rem; font-weight: 500; border: 1px solid var(--de-border-strong); }
    .btn-primary, .btn-primary:hover { background: var(--de-accent); border-color: var(--de-accent); color: #fff; }
    .btn-primary:hover { background: var(--de-accent-strong); border-color: var(--de-accent-strong); }
    .btn-outline-secondary { color: var(--de-text-secondary); border-color: var(--de-border-strong); background: transparent; }
    .btn-outline-secondary:hover { background: var(--de-bg); color: var(--de-text); border-color: var(--de-border-strong); }
    .btn-outline-primary { color: var(--de-accent); border-color: var(--de-accent); }
    .btn-outline-primary:hover { background: var(--de-accent-bg); color: var(--de-accent-strong); border-color: var(--de-accent); }
    .btn-outline-danger { color: var(--de-danger); border-color: #e6c3bf; }
    .btn-outline-danger:hover { background: var(--de-danger-bg); border-color: var(--de-danger); color: var(--de-danger); }
    .btn-outline-warning { color: var(--de-warning); border-color: #ecd8ad; }
    .btn-outline-warning:hover { background: var(--de-warning-bg); border-color: var(--de-warning); color: var(--de-warning); }
    .btn-danger { background: var(--de-danger); border-color: var(--de-danger); }
    .btn-warning { background: var(--de-warning); border-color: var(--de-warning); color: #fff; }

    /* Inputs */
    .form-control, .form-select {
        border: 1px solid var(--de-border-strong); border-radius: var(--de-radius);
        font-size: 0.9rem; padding: 0.5rem 0.75rem;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--de-accent); box-shadow: 0 0 0 3px var(--de-accent-bg);
    }
    .form-label { font-size: 0.85rem; font-weight: 500; color: var(--de-text); margin-bottom: 0.35rem; }
    .form-text { color: var(--de-text-muted); font-size: 0.78rem; }
    .form-check-input:checked { background-color: var(--de-accent); border-color: var(--de-accent); }

    /* Badges */
    .badge { font-weight: 500; border-radius: 6px; padding: 3px 8px; font-size: 0.72rem; }
    .badge.text-bg-primary { background: var(--de-accent-bg) !important; color: var(--de-accent-strong) !important; }
    .badge.text-bg-secondary { background: #efefe9 !important; color: var(--de-text-secondary) !important; }
    .badge.text-bg-success { background: var(--de-success-bg) !important; color: var(--de-success) !important; }
    .badge.text-bg-warning { background: var(--de-warning-bg) !important; color: var(--de-warning) !important; }
    .badge.text-bg-light { background: var(--de-surface) !important; color: var(--de-text-secondary) !important; border: 1px solid var(--de-border); }

    /* Alerts */
    .alert { border-radius: var(--de-radius); border: 1px solid transparent; font-size: 0.88rem; }
    .alert-success { background: var(--de-success-bg); color: var(--de-success); border-color: #cfe6d9; }
    .alert-danger { background: var(--de-danger-bg); color: var(--de-danger); border-color: #f0d3d0; }
    .alert-warning { background: var(--de-warning-bg); color: var(--de-warning); border-color: #f0e2c0; }
    .alert-info { background: var(--de-accent-bg); color: var(--de-accent-strong); border-color: #cfe6df; }

    /* Modals */
    .modal-content { border-radius: var(--de-radius-lg); border: 1px solid var(--de-border); }
    .modal-header, .modal-footer { border-color: var(--de-border); }

    /* Tabs (still used for JS behavior even inside the sidebar) */
    .tab-content { background: transparent; }

    /* Card primitive used across Records / Backups / Activity / Users / Tokens */
    .de-card {
        background: var(--de-surface); border: 1px solid var(--de-border); border-radius: var(--de-radius-lg);
        padding: 0.9rem 1.1rem;
    }
    .de-row {
        background: var(--de-surface); border: 1px solid var(--de-border); border-radius: var(--de-radius);
        padding: 0.7rem 0.9rem; display: flex; align-items: center; justify-content: space-between; gap: 12px;
        margin-bottom: 8px;
    }
    .de-row:last-child { margin-bottom: 0; }
    .de-muted-line { color: var(--de-text-secondary); font-size: 0.82rem; }

    /* App shell / sidebar */
    .app-shell { display: flex; align-items: flex-start; gap: 0; }
    .app-sidebar {
        width: 190px; flex-shrink: 0; display: flex; flex-direction: column; gap: 2px;
        padding-right: 0.75rem; border-right: 1px solid var(--de-border); margin-right: 1.75rem;
        position: sticky; top: 1rem;
    }
    .app-sidebar-brand { font-weight: 600; font-size: 1.05rem; padding: 0.25rem 0.6rem 1rem; color: var(--de-text); }
    .sidebar-item {
        display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
        text-decoration: none; color: var(--de-text-secondary); font-size: 0.87rem;
    }
    .sidebar-item:hover { background: var(--de-bg); color: var(--de-text); }
    .sidebar-item.active { background: var(--de-accent-bg); color: var(--de-accent-strong); font-weight: 500; }
    .sidebar-item i { font-size: 17px; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-item .badge { margin-left: auto; }
    .sidebar-divider { height: 1px; background: var(--de-border); margin: 8px 4px; }
    .app-content { flex: 1; min-width: 0; }

    @media (max-width: 768px) {
        .app-shell { flex-direction: column; }
        .app-sidebar {
            width: 100%; flex-direction: row; overflow-x: auto; border-right: none;
            border-bottom: 1px solid var(--de-border); margin-right: 0; margin-bottom: 1.25rem;
            padding: 0.4rem 0.25rem; position: static; gap: 2px;
        }
        .app-sidebar-brand { display: none; }
        .sidebar-item {
            flex-direction: column; gap: 2px; padding: 6px 10px; font-size: 0.62rem;
            white-space: nowrap; flex-shrink: 0;
        }
        .sidebar-item i { font-size: 20px; }
        .sidebar-item .badge { margin-left: 0; }
        .sidebar-divider { width: 1px; height: 24px; margin: 4px 6px; align-self: center; }
    }
</style>
