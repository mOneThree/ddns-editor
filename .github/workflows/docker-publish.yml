name: Build and Publish ddns-editor

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

env:
  IMAGE_NAME: mthirteenz/ddns-editor

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          TAGS="${IMAGE_NAME}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:${VERSION}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build a single-arch (amd64) image loaded into the local Docker
      # daemon so it can actually be run and smoke-tested. Multi-platform
      # buildx output can't be --load'ed directly, hence this separate
      # build before the real multi-arch push below. A little redundant,
      # but it means a broken image never reaches :latest.
      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: smoke-test:latest

      - name: Smoke test -- run container and hit /healthz
        run: |
          docker run -d --name smoke-test -p 5000:5000 smoke-test:latest
          echo "Waiting for container to come up..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/healthz -o /tmp/healthz.json; then
              if python3 -c "import json,sys; d=json.load(open('/tmp/healthz.json')); sys.exit(0 if d.get('status')=='ok' else 1)"; then
                echo "Healthcheck passed."
                docker logs smoke-test
                docker rm -f smoke-test
                exit 0
              fi
            fi
            sleep 2
          done
          echo "Healthcheck did not pass in time. Container logs:"
          docker logs smoke-test
          docker rm -f smoke-test
          exit 1

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
