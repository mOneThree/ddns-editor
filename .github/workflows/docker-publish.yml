name: Build and Publish ddns-editor

# Triggers:
#  - Every push to main -> rebuilds and pushes the ":latest" tag
#  - Every version tag (e.g. v1.2.0) -> pushes both ":1.2.0" and ":latest"
# You can also trigger it manually from the Actions tab (workflow_dispatch).
on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths:
      - "ddns-editor/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

env:
  IMAGE_NAME: yourusername/ddns-editor   # <-- replace "yourusername" with your Docker Hub namespace

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          TAGS="${IMAGE_NAME}:latest"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            TAGS="${TAGS}
${IMAGE_NAME}:${VERSION}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ddns-editor
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}  
